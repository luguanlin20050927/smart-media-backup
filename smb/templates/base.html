<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Media Backup</title>
    <link rel="stylesheet" href="/static/css/app.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <!-- 侧边栏 -->
    <nav class="sidebar">
        <div class="sidebar-brand">
            <span class="brand-icon">🖼</span>
            <span class="brand-text">SMB</span>
        </div>
        <div class="sidebar-nav">
            <a href="/" class="nav-item {% if active_page == 'dashboard' %}active{% endif %}">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">首页</span>
            </a>
            <a href="/history" class="nav-item {% if active_page == 'history' %}active{% endif %}">
                <span class="nav-icon">📋</span>
                <span class="nav-label">历史记录</span>
            </a>
            <a href="/settings" class="nav-item {% if active_page == 'settings' %}active{% endif %}">
                <span class="nav-icon">⚙️</span>
                <span class="nav-label">设置</span>
            </a>
        </div>
        <div class="sidebar-footer">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText" class="status-text">就绪</span>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
