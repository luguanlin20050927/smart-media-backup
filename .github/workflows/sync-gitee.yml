name: Sync to Gitee and deploy Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          git remote add gitee https://luguanlin:${GITEE_TOKEN}@gitee.com/luguanlin/smart-media-backup.git
          git push -f gitee main
          echo "✅ Synced to Gitee"

      - name: Refresh Gitee Pages via API
        env:
          GITEE_PASSWORD: ${{ secrets.GITEE_PASSWORD }}
        run: |
          # Login and refresh Gitee Pages via API
          TOKEN="${{ secrets.GITEE_TOKEN }}"
          curl -s -X PUT \
            "https://gitee.com/api/v5/repos/luguanlin/smart-media-backup/pages" \
            -d "access_token=${TOKEN}" \
            -d "branch=main" \
            -d "directory=/website" \
            -d "https=false" || true
          echo "✅ Gitee Pages refresh attempted"
